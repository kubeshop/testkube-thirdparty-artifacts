# Example overrides showing where to configure runtime controls
# such as security contexts, labels, annotations and scheduling.

master:
  podLabels:
    app.kubernetes.io/part-of: testkube
  podAnnotations:
    testkube.io/example: "true"
  podSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containerSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
  tolerations: |
    - key: "dedicated"
      operator: "Equal"
      value: "testkube"
      effect: "NoSchedule"
  nodeSelector: |
    kubernetes.io/os: linux

filer:
  podLabels:
    app.kubernetes.io/part-of: testkube
  podAnnotations:
    testkube.io/example: "true"
  podSecurityContext:
